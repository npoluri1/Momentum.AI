# ============================================================================
# Global-Tasks-dos - Nginx Configuration
# ============================================================================

upstream api-gateway   { server api-gateway:8000; }
upstream agents        { server agents-service:8001; }
upstream crm           { server crm-service:8002; }
upstream workflows     { server workflow-engine:8003; }
upstream realtime      { server realtime-service:8004; }
upstream frontend      { server frontend:3000; }

# ─── SSL Configuration (uncomment & place certs in infra/ssl/) ────────────
# ssl_certificate     /etc/nginx/ssl/fullchain.pem;
# ssl_certificate_key /etc/nginx/ssl/privkey.pem;
# ssl_protocols       TLSv1.2 TLSv1.3;
# ssl_ciphers         HIGH:!aNULL:!MD5;
# ssl_prefer_server_ciphers on;
# ssl_session_cache   shared:SSL:10m;
# ssl_session_timeout 10m;

server {
    listen 80 default_server;
    listen [::]:80;
    # listen 443 ssl http2;       # Uncomment for HTTPS
    # listen [::]:443 ssl http2;  # Uncomment for HTTPS

    server_name _;

    # ─── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/octet-stream
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Rate Limiting ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=agents:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=workflows:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=200r/s;

    # ─── Client max body size ─────────────────────────────────────────
    client_max_body_size 10M;

    # ─── Logging ───────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ─── Health Check ─────────────────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ─── API Gateway ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=150 nodelay;
        proxy_pass http://api-gateway/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Correlation-ID" always;
        add_header Access-Control-Allow-Credentials true always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ─── Agents Service ────────────────────────────────────────────────
    location /agents/ {
        limit_req zone=agents burst=40 nodelay;
        proxy_pass http://agents/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ─── CRM Service ───────────────────────────────────────────────────
    location /crm/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://crm/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ─── Workflow Engine ───────────────────────────────────────────────
    location /workflows/ {
        limit_req zone=workflows burst=30 nodelay;
        proxy_pass http://workflows/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ─── WebSocket (Socket.IO) ─────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://realtime/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ─── Static Assets ─────────────────────────────────────────────────
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Frontend (SPA) ───────────────────────────────────────────────
    location / {
        limit_req zone=general burst=300 nodelay;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA fallback: serve index.html for non-file routes
        proxy_intercept_errors on;
        recursive_error_pages on;
        error_page 404 = @frontend_fallback;

        # Cache HTML short
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location @frontend_fallback {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

