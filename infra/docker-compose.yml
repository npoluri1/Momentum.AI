# ============================================================================
# Global-Tasks-dos - Docker Compose
# ============================================================================

version: "3.9"

x-shared-env: &shared-env
  NODE_ENV: ${NODE_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  REDIS_URL: redis://redis:6379/0
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: global_tasks
  POSTGRES_USER: ${POSTGRES_USER:-globaltasks}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
  RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}

x-restart: &restart
  restart: unless-stopped

x-healthcheck: &pg-health
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  # ─── MCP Server ─────────────────────────────────────────────────────────
  mcp-server:
    <<: *restart
    build:
      context: ../backend/mcp-server
      dockerfile: Dockerfile
    container_name: global-tasks-mcp
    ports:
      - "3100:3100"
    environment:
      <<: *shared-env
      API_BASE_URL: http://api-gateway:8000/api/v1
      MCP_TRANSPORT: http
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - global-tasks-net

  # ─── Database ────────────────────────────────────────────────────────────
  postgres:
    <<: *restart
    image: postgres:16-alpine
    container_name: global-tasks-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: global_tasks
      POSTGRES_USER: ${POSTGRES_USER:-globaltasks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-globaltasks} -d global_tasks"]
      <<: *pg-health
    networks:
      - global-tasks-net

  # ─── Cache / Message Broker ──────────────────────────────────────────────
  redis:
    <<: *restart
    image: redis:7-alpine
    container_name: global-tasks-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - global-tasks-net

  rabbitmq:
    <<: *restart
    image: rabbitmq:3.12-management-alpine
    container_name: global-tasks-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - global-tasks-net

  # ─── API Gateway ─────────────────────────────────────────────────────────
  api-gateway:
    <<: *restart
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: global-tasks-api-gateway
    ports:
      - "8000:8000"
    environment:
      <<: *shared-env
      SERVICE_NAME: api-gateway
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      <<: *pg-health
    networks:
      - global-tasks-net

  # ─── Agents Service ──────────────────────────────────────────────────────
  agents-service:
    <<: *restart
    build:
      context: ../backend/agents-service
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: global-tasks-agents-service
    ports:
      - "8001:8001"
    environment:
      <<: *shared-env
      SERVICE_NAME: agents-service
      PORT: 8001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-gpt-4o}
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-4096}
      AGENT_TEMPERATURE: ${AGENT_TEMPERATURE:-0.7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - global-tasks-net

  # ─── CRM Service ─────────────────────────────────────────────────────────
  crm-service:
    <<: *restart
    build:
      context: ../backend/crm-service
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: global-tasks-crm-service
    ports:
      - "8002:8002"
    environment:
      <<: *shared-env
      SERVICE_NAME: crm-service
      PORT: 8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - global-tasks-net

  # ─── Workflow Engine ─────────────────────────────────────────────────────
  workflow-engine:
    <<: *restart
    build:
      context: ../backend/workflow-engine
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: global-tasks-workflow-engine
    ports:
      - "8003:8003"
    environment:
      <<: *shared-env
      SERVICE_NAME: workflow-engine
      PORT: 8003
      WORKFLOW_MAX_EXECUTION_TIME_SEC: ${WORKFLOW_MAX_EXECUTION_TIME_SEC:-300}
      WORKFLOW_MAX_STEPS: ${WORKFLOW_MAX_STEPS:-50}
      WORKFLOW_CONCURRENCY: ${WORKFLOW_CONCURRENCY:-10}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - global-tasks-net

  # ─── Realtime Service (WebSocket) ────────────────────────────────────────
  realtime-service:
    <<: *restart
    build:
      context: ../backend/realtime-service
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: global-tasks-realtime-service
    ports:
      - "8004:8004"
    environment:
      <<: *shared-env
      SERVICE_NAME: realtime-service
      PORT: 8004
      SOCKET_IO_CORS_ORIGINS: ${SOCKET_IO_CORS_ORIGINS:-http://localhost:3000,http://localhost}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - global-tasks-net

  # ─── Frontend ──────────────────────────────────────────────────────────
  frontend:
    <<: *restart
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: global-tasks-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/socket.io}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - global-tasks-net

  # ─── Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    <<: *restart
    image: nginx:alpine
    container_name: global-tasks-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static-assets:/var/www/static
    depends_on:
      - api-gateway
      - agents-service
      - crm-service
      - workflow-engine
      - realtime-service
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - global-tasks-net

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  static-assets:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  global-tasks-net:
    driver: bridge
    name: global-tasks-net
