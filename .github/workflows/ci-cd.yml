name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/api-gateway/requirements.txt
            backend/agents-service/requirements.txt

      - name: Lint Frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npx next lint --no-cache 2>&1 || true

      - name: TypeScript Check
        working-directory: frontend
        run: npx tsc --noEmit 2>&1 || true

      - name: Install Python deps
        run: |
          pip install -r backend/api-gateway/requirements.txt
          pip install -r backend/agents-service/requirements.txt

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Build Docker Images
        run: |
          docker compose -f infra/docker-compose.yml build --parallel

      - name: Push Docker Images
        if: github.ref == 'refs/heads/main'
        run: |
          services="frontend api-gateway agents-service crm-service realtime-service workflow-engine mcp-server"
          for service in $services; do
            docker tag global-tasks-$service:latest ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/$service:${{ env.IMAGE_TAG }}
            docker tag global-tasks-$service:latest ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/$service:latest
            docker push ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/$service:${{ env.IMAGE_TAG }}
            docker push ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/$service:latest
          done

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /opt/global-tasks
            git pull origin main
            docker compose -f infra/docker-compose.yml pull
            docker compose -f infra/docker-compose.yml up -d --remove-orphans
            docker image prune -f
          EOF

  deploy-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: frontend
